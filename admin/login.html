<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Maharani Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Marcellus&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="login-page">
  <div class="login-glow"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">MAHARANI</div>
      <div class="login-sub">Admin Portal</div>
      <div class="login-divider"></div>
    </div>

    <p class="login-title">Sign in to your account</p>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="admin@maharani.in"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            style="padding-right: 44px;"
            required
          />
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="login-forgot">
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg login-btn" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="login-footer">
      &copy; 2026 Maharani. Secure Admin Access.
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLoginPage);
  </script>
</body>
</html>
